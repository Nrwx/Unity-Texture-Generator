title: "[Discussion] "
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to Unity Texture Generator Discussions

        Thanks for being here. Discussions are the place for everything that is useful to talk through, but does not belong directly in an issue yet.

        Use this space to:

        - Ask questions about setup, workflows, exports, materials, AI features, or platform-specific behavior.
        - Share ideas for tools, modifiers, UI improvements, plugins, and release packaging.
        - Show what you are creating with Unity Texture Generator.
        - Help other users test, debug, and understand the project.
        - Discuss refactor direction, roadmap topics, and known limitations.

        Please keep in mind that Unity Texture Generator is still in a refactor state and should not be treated as stable production software yet. Bug reports with clear reproduction steps still belong in Issues; broader questions and ideas belong here.

  - type: textarea
    id: topic
    attributes:
      label: What would you like to discuss?
      description: Share your question, idea, feedback, workflow, or result.
      placeholder: "Example: I am testing the material export flow on Windows and would like to discuss..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add versions, platform details, screenshots, links, or files if they help.
      placeholder: "OS, Python version, Node version, backend/frontend version, screenshots, logs, or related links..."
    validations:
      required: false
